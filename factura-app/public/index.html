<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva factura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14213D;
    --paper:#FFFFFF;
    --stamp:#C1440E;
    --muted:#7A7F87;
    --line:#DDD8CC;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:var(--ink);
    min-height:100vh;
    padding:48px 20px 80px;
    color:var(--ink);
  }
  .card{
    max-width:560px;
    margin:0 auto;
    background:var(--paper);
    border-radius:18px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.5);
    padding:44px 40px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:30px;
    margin:0 0 6px;
  }
  p.subtitle{ color:var(--muted); font-size:14px; margin:0 0 32px; }
  label{
    display:block;
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field{ margin-bottom:18px; }
  input{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-family:'Inter', sans-serif;
    font-size:14px;
    color:var(--ink);
  }
  input:focus{ outline:2px solid var(--stamp); outline-offset:1px; }
  .row{ display:flex; gap:14px; }
  .row .field{ flex:1; }
  button{
    width:100%;
    margin-top:8px;
    padding:13px;
    border:none;
    border-radius:999px;
    background:var(--stamp);
    color:#fff;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  button:hover{ background:#a83a0d; }
  button:disabled{ opacity:.6; cursor:not-allowed; }
  #estado{
    margin-top:18px;
    font-size:13.5px;
    text-align:center;
  }
  #estado.ok{ color:#2F6E51; }
  #estado.error{ color:var(--stamp); }
</style>
</head>
<body>
  <div class="card">
    <h1>Nueva factura</h1>
    <p class="subtitle">Rellena los datos y se generará y enviará el PDF automáticamente.</p>

    <form id="formFactura">
      <div class="field">
        <label for="nombre">Nombre (tu empresa)</label>
        <input id="nombre" name="nombre" required>
      </div>
      <div class="field">
        <label for="nombreCliente">Nombre del cliente</label>
        <input id="nombreCliente" name="nombreCliente" required>
      </div>
      <div class="field">
        <label for="direccion">Dirección</label>
        <input id="direccion" name="direccion" required>
      </div>
      <div class="row">
        <div class="field">
          <label for="correoElectronico">Correo electrónico del cliente</label>
          <input id="correoElectronico" name="correoElectronico" type="email" required>
        </div>
        <div class="field">
          <label for="nif">NIF</label>
          <input id="nif" name="nif" required>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="fechaEmision">Fecha de emisión</label>
          <input id="fechaEmision" name="fechaEmision" type="date" required>
        </div>
        <div class="field">
          <label for="numeroFactura">Nº de factura</label>
          <input id="numeroFactura" name="numeroFactura" required>
        </div>
      </div>
      <div class="field">
        <label for="importe">Importe (€)</label>
        <input id="importe" name="importe" type="text" placeholder="1.942,05" required>
      </div>

      <button type="submit" id="btnEnviar">Generar y enviar factura</button>
      <div id="estado"></div>
    </form>
  </div>

<script>
  const form = document.getElementById('formFactura');
  const boton = document.getElementById('btnEnviar');
  const estado = document.getElementById('estado');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    boton.disabled = true;
    boton.textContent = 'Generando...';
    estado.textContent = '';
    estado.className = '';

    const datos = Object.fromEntries(new FormData(form).entries());

    try {
      const respuesta = await fetch('/generar-factura', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos),
      });
      const resultado = await respuesta.json();

      if (!respuesta.ok) throw new Error(resultado.error || 'Algo salió mal.');

      estado.textContent = '✓ Factura generada y enviada correctamente.';
      estado.className = 'ok';
      form.reset();
    } catch (err) {
      estado.textContent = '✕ ' + err.message;
      estado.className = 'error';
    } finally {
      boton.disabled = false;
      boton.textContent = 'Generar y enviar factura';
    }
  });
</script>
</body>
</html>
